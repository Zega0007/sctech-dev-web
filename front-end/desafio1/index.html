<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario-atv1</title>
</head>

<body>
    <header>
        <h1>Primeiro formulário</h1>

        <nav>
            <ul>
                <li><a href="dados">Dados</a></li>
                <li><a href="escolaridade">Escolaridade</a></li>
                <li><a href="sobre-você">Sobre você</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <form action="">

            <section id="#dados">
                    <h2>Seus dados</h2>
                    <label for="nome">Nome: </label>
                    <input type="text" id="nome" name="nome" required>
    
                    <br>
    
                    <label for="email">E-mail: </label>
                    <input type="email" name="email" id="email" required>
    
                    <br>
    
                    <label for="idade">Idade: </label>
                    <input type="number" name="idade" id="idade" min="0" max="99" required>
    
                    <br>
    
                    <label for="assunto">Assunto: </label>
                    <textarea name="assunto" id="assunto" maxlength="50" required rows="1.5"></textarea>
            </section>
    
            <section id="#escolaridade">

                    <h2>Escolaridade</h2>
                    <label for="nivel-escolar">Nível escolar: </label>
                    <select name="nivel-escolar" id="nivel-escolar" required>
                        <option value="medio-completo">Ensino médio completo</option>
                        <option value="cursando-mestrado">Cursando Mestrado</option>
                        <option value="mestrado-completo">Mestrado Completo</option>
                        <option value="cursando-doutorado">Cursando Doutorado</option>
                        <option value="doutorado-completo">Doutorado Completo</option>
    
                    </select>
    
                    <br>
    
                    <label for="materia">Materia que quer cursar: </label>
                    <select name="materia" id="materia" required>
                        <option value="matematica">Matemática</option>
                        <option value="portugues">Português</option>
                        <option value="biologia">Biologia</option>
                        <option value="ciencias">Ciências</option>
                        <option value="historia">História</option>
                        <option value="geografia">Geografia</option>
                        <option value="artes">Artes</option>
    
                    </select>
    
                    <br>
    
                    <p>Turno disponiveis:</p>
                    <input type="radio" name="turno" id="matutino" required>
                    <label for="matutino">Matutino</label>
                    <input type="radio" name="turno" id="vespertino">
                    <label for="vespertino">Vespertino</label>
                    <input type="radio" name="turno" id="noturno">
                    <label for="noturno">Noturno</label>
    
            </section>
    
            <section id="#sobre-voce">
        
                    <h2>Sobre você:</h2>
                    <textarea name="sobre-voce" id="sobre-voce" cols="30" rows="5" maxlength="200" required></textarea>
                    <br>
                    <input type="submit" value="Enviar formulário">

            </section>
        </form>
    </main>
</body>

</html>
