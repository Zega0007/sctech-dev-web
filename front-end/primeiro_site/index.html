<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Titulo da página</title>
</head>

<body>
    <header>
        <h1>Luan</h1>

        <nav> <!-- navegar-->
            <ul> <!-- lista -->
                <li> <a href="#sobre">Sobre mim</a></li> <!-- elemento da lista-->
                <li><a href="#projetos">Projetos</a></li>
                <li><a href="#contato">Contato</a></li>
                <li><a href="https://www.google.com/?hl=pt_BR" target="_blank"> Google</a></li>
            </ul>
        </nav>
    </header>

    <section id="sobre">
        <h2>Sobre mim</h2>

        <img src="https://labetno.ufpa.br/images/galeria_em_artigos/image03_grd.png" alt="penguim" title="varios penguins">

        <article> <!-- para escrever textos-->
            <p> Meu nome é luan, sou dev</p>
        </article>
    </section>

    <aside>
        <h3>Habilidades</h3>

        <ul>
            <li>HTML</li>
            <li>CSS</li>
            <li>JavaScript</li>
        </ul>

    </aside>

    <section id="projetos">
        <h2>Projetos</h2>
        <article>
            <h3>Portifólio</h3>
            <p>Poco loco</p>
        </article>
    </section>

    <footer>
        <p>Direitos reservados a Luan</p>

        <section id="contato">
            <h3>Contatos</h3>

            <p>Tem projeto em mente?</p>

        <form action="">
            <label for="nome">Nome: </label>
            <input type="text" id="nome" name="nome" required> <br>

            <label for="email">E-mail: </label>
            <input type="email" id="email" name="email" required> <br>
            <!-- id é para identificar na página, name para identificar no banco o dado-->
            <label for="telefone">Telefone: </label>
            <input type="tel" id="telefone" name="telefone"> <br>

            <label for="assunto">Assunto: </label>
            <select name="assunto" id="assunto"> <!--seleção de assuntos-->
                <option value="orcamento">Orçamento</option>
                <option value="duvida">Dúvida</option>
                <option value="outro">Outro</option>
            </select> <br>

            <label for="mensagem">Mensagem: </label> <!--campo de adicionar mensagem-->
            <textarea name="mensagem" id="mensagem" cols="30" rows="1.5" required></textarea> <br>

            <input type="checkbox" id="inscricao" name="inscricao"> <!--checkbox-->
            <label for="inscricao">Deseja receber minha newsletter? marque a caixa.</label> <br>

            <input type="submit" value="Enviar mensagem"> <!--botao de enviar-->
        </form>

        </section>
    </footer>
</body>

</html>
